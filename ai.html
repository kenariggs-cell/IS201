<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Word Rush</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #121213;
    color: white;
  }

  h1 {
    margin-top: 20px;
  }

  #board {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    gap: 8px;
    width: 300px;
    margin: 20px auto;
  }

  .row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .tile {
    width: 55px;
    height: 55px;
    border: 2px solid #3a3a3c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    text-transform: uppercase;
    background-color: #121213;
  }

  .correct {
    background-color: #538d4e;
    border: none;
  }

  .present {
    background-color: #b59f3b;
    border: none;
  }

  .absent {
    background-color: #3a3a3c;
    border: none;
  }

  #message {
    font-size: 1.3rem;
    margin-top: 15px;
  }

  #restart {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 1rem;
    display: none;
    cursor: pointer;
  }
</style>
</head>

<body>

<h1>Word Rush</h1>

<div style="margin-bottom: 20px;">
  <a href="index.html" style="display: inline-block; padding: 10px 20px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px;">Back to Home</a>
</div>

<div id="board"></div>

<div id="message"></div>
<button id="restart" onclick="startGame()">Play Again</button>

<script>
const words = ["tried", "crate", "plain", "style", "bland", "thrive", "wrong"];
let answer;
let currentRow;
let currentCol;
let board;
let gameOver;

function startGame() {
  answer = words[Math.floor(Math.random() * words.length)];
  currentRow = 0;
  currentCol = 0;
  gameOver = false;

  document.getElementById("board").innerHTML = "";
  document.getElementById("message").textContent = "";
  document.getElementById("restart").style.display = "none";

  board = [];

  for (let i = 0; i < 6; i++) {
    let row = document.createElement("div");
    row.className = "row";
    board[i] = [];

    for (let j = 0; j < 5; j++) {
      let tile = document.createElement("div");
      tile.className = "tile";
      row.appendChild(tile);
      board[i][j] = tile;
    }

    document.getElementById("board").appendChild(row);
  }
}

document.addEventListener("keydown", (e) => {
  if (gameOver) return;

  if (e.key === "Backspace") {
    if (currentCol > 0) {
      currentCol--;
      board[currentRow][currentCol].textContent = "";
    }
  } 
  else if (e.key === "Enter") {
    if (currentCol === 5) checkWord();
  } 
  else if (/^[a-zA-Z]$/.test(e.key)) {
    if (currentCol < 5) {
      board[currentRow][currentCol].textContent = e.key.toUpperCase();
      currentCol++;
    }
  }
});

function checkWord() {
  let guess = "";

  for (let i = 0; i < 5; i++) {
    guess += board[currentRow][i].textContent.toLowerCase();
  }

  if (guess.length < 5) return;

  let answerArr = answer.split("");
  let guessArr = guess.split("");

  // First pass (correct letters)
  for (let i = 0; i < 5; i++) {
    if (guessArr[i] === answerArr[i]) {
      board[currentRow][i].classList.add("correct");
      answerArr[i] = null;
      guessArr[i] = null;
    }
  }

  // Second pass (present letters)
  for (let i = 0; i < 5; i++) {
    if (guessArr[i]) {
      let index = answerArr.indexOf(guessArr[i]);
      if (index !== -1) {
        board[currentRow][i].classList.add("present");
        answerArr[index] = null;
      } else {
        board[currentRow][i].classList.add("absent");
      }
    }
  }

  if (guess === answer) {
    document.getElementById("message").textContent = "🎉 You guessed it!";
    gameOver = true;
    document.getElementById("restart").style.display = "inline-block";
    return;
  }

  currentRow++;
  currentCol = 0;

  if (currentRow === 6) {
    document.getElementById("message").textContent = "Game Over! Word was: " + answer.toUpperCase();
    gameOver = true;
    document.getElementById("restart").style.display = "inline-block";
  }
}

// Start game on load
startGame();
</script>

</body>
</html>
