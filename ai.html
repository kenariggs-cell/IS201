<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Wordle Clone</title>

<style>
:root {
  --bg: #121213;
  --text: white;
  --tile-border: #3a3a3c;
  --key-bg: #818384;
  --correct: #538d4e;
  --present: #b59f3b;
  --absent: #3a3a3c;
}

body.light {
  --bg: #ffffff;
  --text: #121213;
  --tile-border: #d3d6da;
  --key-bg: #d3d6da;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
  text-align: center;
  transition: 0.3s;
}

h1 { margin-top: 10px; }

.top-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  align-items: center;
}

button {
  cursor: pointer;
}

#board {
  display: grid;
  grid-template-rows: repeat(6, 1fr);
  gap: 6px;
  width: 300px;
  margin: 20px auto;
}

.row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}

.tile {
  width: 55px;
  height: 55px;
  border: 2px solid var(--tile-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  text-transform: uppercase;
}

.correct { background: var(--correct); border: none; color: white; }
.present { background: var(--present); border: none; color: white; }
.absent { background: var(--absent); border: none; color: white; }

#keyboard {
  margin-top: 20px;
}

.key-row {
  display: flex;
  justify-content: center;
  margin: 5px;
  gap: 5px;
}

.key {
  padding: 10px;
  min-width: 30px;
  background: var(--key-bg);
  border: none;
  border-radius: 5px;
  cursor: pointer;
  text-transform: uppercase;
  font-weight: bold;
}

.key.big {
  min-width: 60px;
}

#message { margin-top: 10px; font-size: 1.2rem; }
#timer { font-size: 1.2rem; margin-top: 10px; }

#shareBtn, #restartBtn {
  margin-top: 10px;
  padding: 10px 15px;
  display: none;
}
</style>
</head>

<body>
<br>
<div class="top-bar">
  <h1>Word Rush</h1>
</div>

<div class="button-bar">
  <a href="fromScratch.html" style="display: inline-block; padding: 8px 12px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px; margin-right: 10px;">Back to My Interests</a>
  <button onclick="toggleMode()">🌗 Mode</button>
</div>

<div id="timer">⏱ Time: 120</div>

<div id="board"></div>

<div id="keyboard"></div>

<div id="message"></div>

<button id="shareBtn" onclick="shareResult()">Share</button>
<button id="restartBtn" onclick="startGame()">Restart</button>

<script>
const words = ["tried","crate","plain","style","bland","wrong"];

let answer, row = 0, col = 0, gameOver = false;
let board = [];
let keyState = {};
let timeLeft = 120;
let timer;

function startGame() {
  answer = words[Math.floor(Math.random() * words.length)];
  row = 0;
  col = 0;
  gameOver = false;
  keyState = {};
  timeLeft = 120;

  document.getElementById("message").textContent = "";
  document.getElementById("shareBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "none";

  buildBoard();
  buildKeyboard();
  startTimer();
}

function buildBoard() {
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";
  board = [];

  for (let i = 0; i < 6; i++) {
    let r = document.createElement("div");
    r.className = "row";
    board[i] = [];

    for (let j = 0; j < 5; j++) {
      let t = document.createElement("div");
      t.className = "tile";
      r.appendChild(t);
      board[i][j] = t;
    }

    boardDiv.appendChild(r);
  }
}

function buildKeyboard() {
  const layout = [
    "qwertyuiop",
    "asdfghjkl",
    "zxcvbnm"
  ];

  const kb = document.getElementById("keyboard");
  kb.innerHTML = "";

  layout.forEach(rowStr => {
    let rowDiv = document.createElement("div");
    rowDiv.className = "key-row";

    for (let ch of rowStr) {
      let btn = document.createElement("button");
      btn.textContent = ch;
      btn.className = "key";
      btn.onclick = () => handleKey(ch);
      rowDiv.appendChild(btn);
    }

    kb.appendChild(rowDiv);
  });

  let bottom = document.createElement("div");
  bottom.className = "key-row";

  let enter = document.createElement("button");
  enter.textContent = "Enter";
  enter.className = "key big";
  enter.onclick = checkWord;

  let del = document.createElement("button");
  del.textContent = "⌫";
  del.className = "key big";
  del.onclick = backspace;

  bottom.appendChild(enter);
  bottom.appendChild(del);

  kb.appendChild(bottom);
}

document.addEventListener("keydown", e => {
  if (gameOver) return;

  if (e.key === "Backspace") backspace();
  else if (e.key === "Enter") checkWord();
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toLowerCase());
});

function handleKey(letter) {
  if (col < 5 && !gameOver) {
    board[row][col].textContent = letter.toUpperCase();
    col++;
  }
}

function backspace() {
  if (col > 0) {
    col--;
    board[row][col].textContent = "";
  }
}

function checkWord() {
  if (col < 5 || gameOver) return;

  let guess = "";
  for (let i = 0; i < 5; i++) {
    guess += board[row][i].textContent.toLowerCase();
  }

  let ansArr = answer.split("");
  let guessArr = guess.split("");

  let result = ["absent","absent","absent","absent","absent"];

  // correct
  for (let i = 0; i < 5; i++) {
    if (guessArr[i] === ansArr[i]) {
      result[i] = "correct";
      ansArr[i] = null;
    }
  }

  // present
  for (let i = 0; i < 5; i++) {
    if (result[i] !== "correct") {
      let idx = ansArr.indexOf(guessArr[i]);
      if (idx !== -1) {
        result[i] = "present";
        ansArr[idx] = null;
      }
    }
  }

  for (let i = 0; i < 5; i++) {
    board[row][i].classList.add(result[i]);
    updateKey(guessArr[i], result[i]);
  }

  if (guess === answer) {
    winGame();
    return;
  }

  row++;
  col = 0;

  if (row === 6) endGame(false);
}

function updateKey(letter, status) {
  const keys = document.querySelectorAll(".key");
  keys.forEach(k => {
    if (k.textContent === letter) {
      if (keyState[letter] === "correct") return;
      if (keyState[letter] === "present" && status === "absent") return;

      keyState[letter] = status;
      k.className = "key " + status;
    }
  });
}

function startTimer() {
  clearInterval(timer);
  timer = setInterval(() => {
    if (gameOver) return;

    timeLeft--;
    document.getElementById("timer").textContent = "⏱ Time: " + timeLeft;

    if (timeLeft <= 0) {
      endGame(false);
    }
  }, 1000);
}

function winGame() {
  endGame(true);
  confetti();
}

function endGame(win) {
  gameOver = true;
  clearInterval(timer);

  document.getElementById("message").textContent =
    win ? "🎉 You Win!" : "❌ Game Over! Word: " + answer;

  document.getElementById("shareBtn").style.display = "inline-block";
  document.getElementById("restartBtn").style.display = "inline-block";
}

function toggleMode() {
  document.body.classList.toggle("light");
}

function shareResult() {
  let text = "Wordle Clone Result\n\n";

  for (let i = 0; i < row; i++) {
    let line = "";
    for (let j = 0; j < 5; j++) {
      let tile = board[i][j];
      if (tile.classList.contains("correct")) line += "🟩";
      else if (tile.classList.contains("present")) line += "🟨";
      else line += "⬛";
    }
    text += line + "\n";
  }

  navigator.clipboard.writeText(text);
  alert("Copied to clipboard!");
}

function confetti() {
  for (let i = 0; i < 80; i++) {
    let c = document.createElement("div");
    c.textContent = "🎉";
    c.style.position = "fixed";
    c.style.left = Math.random() * 100 + "vw";
    c.style.top = "-20px";
    c.style.fontSize = "20px";
    document.body.appendChild(c);

    let fall = setInterval(() => {
      c.style.top = (parseFloat(c.style.top) + 5) + "px";
      if (parseFloat(c.style.top) > window.innerHeight) {
        c.remove();
        clearInterval(fall);
      }
    }, 20);
  }
}

startGame();
</script>

</body>
</html>
